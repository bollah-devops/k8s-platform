apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-deployment
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask
  template:
    metadata:
      labels:
        app: flask
    spec:
      containers:
        - name: flask
          image: tawa123/multi-env-platform:latest
          ports:
            - containerPort: 5000
          env:
            - name: ENV_NAME
              valueFrom:
                configMapKeyRef:
                  name: flask-config
                  key: ENV_NAME
            - name: VERSION
              valueFrom:
                configMapKeyRef:
                  name: flask-config
                  key: VERSION
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: flask-secret
                  key: SECRET_KEY
